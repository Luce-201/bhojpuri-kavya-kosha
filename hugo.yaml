baseURL: "https://bhojpuri-kavya-kosh.netlify.app/"
languageCode: "hi"
title: "भोजपुरी काव्य कोश"

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
  page:
    - HTML

taxonomies:
  theme: themes
  poet: poets_tax

pagination:
  pagerSize: 20

enableRobotsTXT: true
enableEmoji: true

params:
  siteName: "भोजपुरी काव्य कोश"
  siteNameEn: "Bhojpuri Kavya Kosha"
  description: "A digital anthology of Bhojpuri language poetry"
  descriptionHi: "भोजपुरी भाषा काव्य का डिजिटल संग्रह"
  accentColor: "#1a5ca8"
  bgColor: "#e8f0fd"

markup:
  goldmark:
    renderer:
      unsafe: true