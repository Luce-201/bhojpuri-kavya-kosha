baseURL: "https://bhojpuri-kavya-kosh.netlify.app/"
languageCode: "hi"
title: "भोजपुरी काव्य कोश"
outputs:
  home:
    - HTML
    - RSS
    - JSON
defaultContentLanguage: "hi"

# Taxonomies — this creates your category/filter system
taxonomies:
  theme: themes
  poet: poets_tax

# Pagination
pagination:
  pagerSize: 20

# Build settings
enableRobotsTXT: true
enableEmoji: true

params:
  siteName: "भोजपुरी काव्य कोश"
  siteNameEn: "Bhojpuri Kavya Kosha"
  description: "A digital anthology of Bhojpuri language poetry"
  descriptionHi: "भोजपुरी भाषा काव्य का डिजिटल संग्रह"
  accentColor: "#0d6b5a"   # deep teal — change if you want
  bgColor: "#E3FDF6"        # cool mint background

markup:
  goldmark:
    renderer:
      unsafe: true   # allows HTML in markdown — needed for audio embeds
